name: Refresh temperature data
on:
  schedule:
    - cron: '17 5 * * *'   # daily 05:17 UTC
  workflow_dispatch:
permissions:
  contents: write
  actions: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run fetch:temps
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain src/data/generated/temperatures.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/generated/temperatures.json
            git commit -m "data: refresh temperatures"
            git push
            gh workflow run deploy.yml
          else
            echo "No temperature changes."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
